<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doraemon Projects</title>
    <link rel="stylesheet" href="../style.css">
  </head>
  <body>
    <main>
      <header class="page-header">
        <p class="eyebrow">Selected Gadget Highlights</p>
        <h1 class="projects-title">Project Collection</h1>
        <p class="lead">
          Each project below represents a signature Doraemon gadget or support system.
        </p>
      </header>

      <section class="panel projects-visualization">
        <div class="chart-header">
          <h2>Projects by Year</h2>
          <button class="reset-year-filter" type="button" disabled>Show all years</button>
        </div>
        <div class="chart-container">
          <svg
            id="projects-pie-plot"
            viewBox="-50 -50 100 100"
            role="img"
            aria-label="Pie chart of projects grouped by year"
          ></svg>
          <ul class="legend" aria-label="Project years"></ul>
        </div>
      </section>

      <input
        class="searchBar"
        type="search"
        aria-label="Search projects"
        placeholder="Search projects..."
      >

      <section class="projects" aria-label="Doraemon gadget projects"></section>
    </main>

    <footer>
      <p>Project cards, filters, and the year chart are rendered from JSON for Lab 5.</p>
    </footer>

    <script src="../global.js" type="module"></script>
    <script src="projects.js" type="module"></script>
  </body>
</html>
